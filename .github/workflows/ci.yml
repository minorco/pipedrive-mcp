name: CI

# integration is where work lands and what deploys to staging (via
# notify-cloudflare), so it gets the full gate; main only advances on promote.
on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Fail if raw fixtures exist
        run: |
          if [ -d "test/fixtures/raw" ]; then
            echo "ERROR: test/fixtures/raw/ contains unsanitized data and must not be committed"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint
      - run: npm run build
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pipedrive-mcp:test .

      - name: Verify image starts
        run: |
          docker run --rm --entrypoint node \
            -e PIPEDRIVE_API_TOKEN=test-token \
            -e PIPEDRIVE_COMPANY_DOMAIN=testcompany \
            pipedrive-mcp:test -e "console.log('OK')"
